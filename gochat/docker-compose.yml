name: gochat

services:
  gochat_server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: prod
    container_name: server
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      gochat_postgres:
        condition: service_healthy

  gochat_postgres:
    image: postgres:18-alpine
    container_name: gochat_postgres
    restart: unless-stopped
    shm_size: 128mb
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
