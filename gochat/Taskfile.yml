# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  GREETING: Hello, world!

tasks:
  default:
    desc: Print a greeting message
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  dev:
    desc: Run compose for development
    cmd: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --watch

  build-dev:
    desc: Build compose for development
    cmd: docker compose -f docker-compose.yml -f docker-compose.dev.yml build --no-cache
