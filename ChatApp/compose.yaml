services:
  server:
    image: server
    build:
      context: .
      dockerfile: Server/Dockerfile
    ports:
      - "8080:8080"

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    shm_size: 256mb

volumes:
  pgdata:
