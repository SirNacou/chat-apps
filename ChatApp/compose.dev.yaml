services:
  server:
    build:
      context: .
      dockerfile: Server/Dockerfile
      target: restore
      args:
        BUILD_CONFIGURATION: Debug
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: 1
      DOTNET_WATCH_NON_INTERACTIVE: 1
    develop:
      watch:
        - path: ./Server
          action: sync
          target: /src/Server
    # ⚡ 4. Override the entrypoint to run the .NET Watch compiler engine natively
    command: dotnet watch --project /src/Server --non-interactive --no-launch-profile --urls http://+:8080

  migration-runner:
    build:
      context: .
      dockerfile: Server/Dockerfile
      target: migration
      args:
        BUILD_CONFIGURATION: Debug
    env_file:
      - .env
    develop:
      watch:
        - path: ./Server/Migrations
          action: rebuild

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    command: [ "bun", "run", "dev", "--host", "0.0.0.0", "--port", "80" ]
    develop:
      watch:
        - path: ./client/package.json
          action: rebuild
        - path: ./client/bun.lock
          action: rebuild
        - path: ./client
          action: sync
          target: /app
          ignore:
            - /app/node_modules
            - /app/dist
            - /app/.tanstack
